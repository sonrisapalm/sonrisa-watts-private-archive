            background-color: #0a0a0a; /* Neutral deep dark, no tint */
            color: #ffffff; 
            margin: 0;
            padding: 0;
        }

        /* 56 FIX: row flow ensures images stay in the exact order of the HTML */
        .archive-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-flow: row; 
            gap: 1.5rem;
            width: 100%;
        }
        
        @media (min-width: 768px) { .archive-grid { grid-template-columns: repeat(3, 1fr); gap: 2rem; } }
        @media (min-width: 1024px) { .archive-grid { grid-template-columns: repeat(4, 1fr); } }

        .media-card {
            position: relative;
            width: 100%;
            overflow: hidden;
            display: block;
        }

        .media-card img, .media-card video {
            width: 100%;
            height: auto;
            display: block;
            /* REMOVED ALL FILTERS, OPACITY, AND GRAYSCALE */
            filter: none !important;
            mix-blend-mode: normal !important;
            image-rendering: auto;
        }

        /* Large Featured Image (873) - No cropping */
        .featured {
            grid-column: span 2;
        }

        .nav-link {
            letter-spacing: 0.4em;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 700;
            color: #888;
            padding: 1rem 2rem;
            border: 1px solid #222;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: #fff;
            border-color: #444;
            background: #111;
        }
    </style>
</head>
