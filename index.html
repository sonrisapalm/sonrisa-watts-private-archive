    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; 
            color: #ffffff; 
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* 56 FIX: row flow ensures images stay in your exact order */
        .archive-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-flow: row; 
            gap: 1rem;
            width: 100%;
        }
        
        @media (min-width: 768px) { .archive-grid { grid-template-columns: repeat(3, 1fr); gap: 1.5rem; } }
        @media (min-width: 1024px) { .archive-grid { grid-template-columns: repeat(4, 1fr); } }

        .media-card {
            position: relative;
            width: 100%;
            overflow: hidden;
            display: block;
            cursor: zoom-in;
            background: #000;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Hover Interaction: Grows slightly */
        .media-card:hover {
            transform: scale(1.03);
            z-index: 10;
        }

        .media-card img, .media-card video {
            width: 100%;
            height: auto;
            display: block;
            filter: none !important; /* Original Colors Only */
            image-rendering: auto;
            transition: opacity 0.3s ease;
        }

        /* 873 Featured Section */
        .featured {
            grid-column: span 2;
        }

        .nav-link {
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-size: 10px;
            font-weight: 900;
            color: #ffffff;
            padding: 1.5rem 3rem;
            border: 1px solid #333;
            transition: all 0.2s ease;
            background: transparent;
        }

        .nav-link:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        /* Zoom Modal Styling */
        #zoomModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        #zoomModal img, #zoomModal video {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
    </style>

    <div id="zoomModal" onclick="this.style.display='none'">

    <script>
        function openZoom(el) {
            const modal = document.getElementById('zoomModal');
            const content = document.getElementById('modalContent');
            const media = el.querySelector('img, video').cloneNode(true);
            
            if(media.tagName === 'VIDEO') {
                media.controls = true;
                media.autoplay = true;
            }
            
            content.innerHTML = '';
            content.appendChild(media);
            modal.style.display = 'flex';
        }
