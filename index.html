    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .text-gradient {
            background: linear-gradient(to right, #ffffff, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* The Secret Sauce: Pure Masonry without Cropping */
        .masonry-container {
            columns: 1;
            column-gap: 1.5rem;
            width: 100%;
        }
        
        @media (min-width: 768px) { .masonry-container { columns: 2; } }
        @media (min-width: 1024px) { .masonry-container { columns: 3; } }

        .media-card {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            position: relative;
            border-radius: 0.5rem;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            background: #070b14;
            transition: all 0.4s ease;
        }

        /* NO object-fit: cover here. We use auto height. */
        .media-card img, .media-card video {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.6s ease;
        }

        .media-card:hover {
            border-color: rgba(255,255,255,0.2);
            transform: scale(1.01);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
