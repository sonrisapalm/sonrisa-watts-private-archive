        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505;

        /* Strict Sequential Grid - Fixes image 56 jumping */
        .archive-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-flow: row; 
            gap: 2rem;
            width: 100%;
        }
        
        @media (min-width: 768px) { .archive-grid { grid-template-columns: repeat(3, 1fr); gap: 3rem; } }
        @media (min-width: 1024px) { .archive-grid { grid-template-columns: repeat(4, 1fr); } }

        .media-card {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .media-card img, .media-card video {
            width: 100%;
            height: auto;
            max-height: 80vh;
            object-fit: contain; /* NO CROPPING: Shows the full original file */
            display: block;
            /* NO FILTERS: Colors remain 100% original */
        }

        .media-card:hover {
            transform: scale(1.02);
        }

        /* Standout styling for the 873 photo */
        .featured {
            grid-column: span 2;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
        }

        .glass-nav:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .luxury-label {
            letter-spacing: 0.6em;
            text-transform: uppercase;
            font-size: 9px;
            color: #444;
            margin-top: 2rem;
        }
    </style>
</head>

    <div id="mediaModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/98 backdrop-blur-3xl cursor-zoom-out">
        <div class="relative max-w-[95vw] max-h-[95vh] flex items-center justify-center">
            <button id="closeModal" class="absolute -top-20 right-0 text-white/20 hover:text-white text-[10px] tracking-[0.5em] uppercase font-bold transition-all">[ ESC / CLOSE ]</button>
            <div id="modalContent" class="w-full h-full"></div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('mediaModal');
        const modalContent = document.getElementById('modalContent');
        const closeModal = document.getElementById('closeModal');
        const cards = document.querySelectorAll('.media-card');

        cards.forEach(card => {
            card.addEventListener('click', () => {
                const media = card.querySelector('img, video');
                if(!media) return;
                modalContent.innerHTML = ''; 

                const cloned = media.cloneNode(true);
                // Resetting style for modal to ensure original aspect ratio
                cloned.style.maxHeight = '90vh';
                cloned.style.width = 'auto';
                if (cloned.tagName === 'VIDEO') {
                    cloned.controls = true;
                    cloned.autoplay = true;
                }
                modalContent.appendChild(cloned);
                modal.classList.add('active');
                modal.style.display = 'flex';
                document.body.style.overflow = 'hidden'; 
            });
        });

        const handleClose = () => {
            modal.style.display = 'none';
            modalContent.innerHTML = '';
            document.body.style.overflow = 'auto';
        };

        modal.addEventListener('click', (e) => {
            if (e.target === modal || e.target === closeModal) handleClose();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') handleClose();
        });
    </script>
