    <style>
        body {

            background-color: #000; 
            color: #fff;

            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        #progress-bar {
            position: fixed; top: 0; left: 0; height: 1px;
            background: #fff; width: 0%; z-index: 10001;
        }

        #custom-cursor {
            width: 12px; height: 12px; background: #fff; border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999;
            mix-blend-mode: difference; transition: transform 0.3s ease;
            display: none;
        }
        @media (min-width: 1024px) { #custom-cursor { display: block; } }

        .reveal {
            opacity: 0; transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .archive-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            align-items: start;
            grid-auto-flow: dense;
        }
        
        @media (min-width: 768px) { 
            .archive-grid { grid-template-columns: repeat(3, 1fr); gap: 2rem; } 
        }
        @media (min-width: 1024px) { 
            .archive-grid { grid-template-columns: repeat(4, 1fr); gap: 3rem; } 
        }

        .media-card {
            position: relative; overflow: hidden; width: 100%;
            background: #0a0a0a; border-radius: 2px;
            transition: all 0.5s ease;
        }

        .media-card img, .media-card video {
            width: 100%; height: 100%; display: block; object-fit: cover;
        }

        .span-2 { grid-column: span 2; }
        .row-2 { grid-row: span 2; }

        .video-feature-box {
            grid-column: span 2;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);

        .nav-link:hover { color: #fff; }

        #zoomModal {
            display: none; position: fixed; inset: 0;
            background: #000; z-index: 10000;
            justify-content: center; align-items: center;
        }

        .video-scroll-container {
            display: flex; overflow-x: auto; gap: 12px;
            padding-bottom: 5px; scrollbar-width: none;
        }
        .video-scroll-container::-webkit-scrollbar { display: none; }

        .mini-video-card {
            flex: 0 0 140px; aspect-ratio: 9/16;
            background: #000; border-radius: 10px; overflow: hidden;
        }

        /* Fixed logic to prevent overlapping */
        .featured-image {
            grid-column: span 2;
            z-index: 10;
            position: relative;
        }
    </style>

    <script>
        window.onscroll = function() {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        };

        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', e => {
            if(cursor) {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            }
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        function openZoom(el) {
            const modal = document.getElementById('zoomModal');
            const content = document.getElementById('modalContent');
            const sourceMedia = el.querySelector('img, video');
            if(!sourceMedia) return;
            const media = sourceMedia.cloneNode(true);
            if(media.tagName === 'VIDEO') { media.controls = true; media.autoplay = true; }
            content.innerHTML = '';
            content.appendChild(media);
            modal.style.display = 'flex';
        }
    </script>
