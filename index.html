        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617;

        }

        .text-gradient {
            background: linear-gradient(to right, #ffffff, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* High-Density Masonry */
        .archive-container {
            columns: 2;
            column-gap: 1rem;
            width: 100%;
        }
        
        @media (min-width: 768px) { .archive-container { columns: 3; } }
        @media (min-width: 1024px) { .archive-container { columns: 4; } }

        .media-card {
            break-inside: avoid;
            margin-bottom: 1rem;
            position: relative;
            border-radius: 0.5rem;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
            background: #070b14;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .media-card img, .media-card video {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.8s ease;
        }

        .media-card:hover {
            border-color: rgba(255,255,255,0.15);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.7);
        }

        .media-card:hover img, .media-card:hover video {
            transform: scale(1.04);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
