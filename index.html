<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .text-gradient {
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .media-container { 
            position: relative; 
            overflow: hidden; 
            border-radius: 1rem; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.6s cubic-bezier(0.2, 0, 0.2, 1);
            background: #0f172a;
        }
        
        .media-container img, .media-container video { 
            transition: transform 1.5s cubic-bezier(0.2, 0, 0.2, 1); 
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .media-container:hover img, .media-container:hover video { transform: scale(1.05); }
        .media-container:hover { border-color: rgba(255,255,255,0.2); box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7); }
    </style>
</head>
