    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000; 
            color: #fff; 
            margin: 0;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* 1. Scroll Progress Bar */
        #progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 1px;
            background: #fff;
            width: 0%;
            z-index: 10001;
        }

        /* 2. Custom Cursor */
        #custom-cursor {
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            display: none;
        }
        @media (min-width: 1024px) { #custom-cursor { display: block; } }

        /* 3. Reveal Animation */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Editorial Rhythm Grid */
        .archive-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-flow: dense;
            gap: 1.5rem;
        }
        
        @media (min-width: 768px) { .archive-grid { grid-template-columns: repeat(3, 1fr); gap: 3rem; } }
        @media (min-width: 1024px) { .archive-grid { grid-template-columns: repeat(4, 1fr); gap: 4rem; } }

        .media-card {
            position: relative;
            overflow: hidden;
            cursor: none; /* Hide default for custom cursor */
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .media-card img, .media-card video {
            width: 100%;
            height: auto;
            display: block;
        }

        .span-2 { grid-column: span 2; }
        .row-2 { grid-row: span 2; }

        .nav-link {
            letter-spacing: 0.8em;
            text-transform: uppercase;
            font-size: 9px;
            font-weight: 200;
            color: rgba(255,255,255,0.4);
            padding: 2rem;
            transition: all 0.4s ease;
        }

        .nav-link:hover {
            color: #fff;
            letter-spacing: 1em;
        }

        #zoomModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.99);
            z-index: 10000;
            padding: 2rem;
            justify-content: center;
            align-items: center;
        }

        #zoomModal img, #zoomModal video {
            max-width: 100%;
            max-height: 95vh;
            object-fit: contain;
        }
    </style>

    <script>
        // 1. Progress Bar Logic
        window.onscroll = function() {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        };

        // 2. Custom Cursor Movement
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // 3. Cursor Scaling on Hover
        document.querySelectorAll('.media-card, .nav-link').forEach(item => {
            item.addEventListener('mouseenter', () => { 
                cursor.style.transform = 'scale(6)'; 
                cursor.style.background = 'rgba(255,255,255,0.1)';
            });
            item.addEventListener('mouseleave', () => { 
                cursor.style.transform = 'scale(1)'; 
                cursor.style.background = '#fff';
            });
        });

        // 4. Scroll Reveal (Intersection Observer)
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // 5. Modal Logic
        function openZoom(el) {
            const modal = document.getElementById('zoomModal');
            const content = document.getElementById('modalContent');
            const sourceMedia = el.querySelector('img, video');
            const media = sourceMedia.cloneNode(true);
            if(media.tagName === 'VIDEO') { media.controls = true; media.autoplay = true; }
            content.innerHTML = '';
            content.appendChild(media);
            modal.style.display = 'flex';
        }
    </script>
