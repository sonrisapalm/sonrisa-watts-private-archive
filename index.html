        #custom-cursor {

            background: #fff;

            position: fixed;
            pointer-events: none;

            transition: transform 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            display: none;
        }
        @media (min-width: 1024px) { #custom-cursor { display: block; } }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);

        .reveal.active {

        .archive-grid {

            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            grid-auto-flow: dense;
            align-items: start;

        @media (min-width: 768px) { .archive-grid { grid-template-columns: repeat(3, 1fr); gap: 3rem; } }
        @media (min-width: 1024px) { .archive-grid { grid-template-columns: repeat(4, 1fr); gap: 4rem; } }

        .media-card {

        .media-card img, .media-card video {

            height: auto;

    <script>
        window.onscroll = function() {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        };

        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('.media-card, .nav-link').forEach(item => {
            item.addEventListener('mouseenter', () => { 
                cursor.style.transform = 'scale(6)'; 
                cursor.style.background = 'rgba(255,255,255,0.1)';
            });
            item.addEventListener('mouseleave', () => { 
                cursor.style.transform = 'scale(1)'; 
                cursor.style.background = '#fff';
            });
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        function openZoom(el) {
            const modal = document.getElementById('zoomModal');
            const content = document.getElementById('modalContent');
            const sourceMedia = el.querySelector('img, video');
            const media = sourceMedia.cloneNode(true);
            if(media.tagName === 'VIDEO') { media.controls = true; media.autoplay = true; }
            content.innerHTML = '';
            content.appendChild(media);
            modal.style.display = 'flex';
        }
        
function drawGalaxy() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    stars.forEach(star => {
        ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();

        // Upward drift
        star.y -= star.speed; 
        if (star.y < 0) star.y = canvas.height;
        
        // Subtle shimmer logic
        star.opacity += (Math.random() - 0.5) * 0.01;
        if (star.opacity < 0.1) star.opacity = 0.1;
        if (star.opacity > 0.7) star.opacity = 0.7;
    });

    requestAnimationFrame(drawGalaxy);
}

window.addEventListener('resize', initGalaxy);
initGalaxy();
drawGalaxy();
    </script>
