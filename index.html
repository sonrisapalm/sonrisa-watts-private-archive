        /* Grid Layout (Fixed Order & Sizing) */
        .archive-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            width: 100%;
        }
        
        @media (min-width: 768px) { .archive-container { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .archive-container { grid-template-columns: repeat(4, 1fr); } }

        .media-card {
            position: relative;
            border-radius: 0.5rem;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
            background: #070b14;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
            height: 100%; /* Ensures cards fill grid cells */
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .media-card img, .media-card video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Keeps everything looking neat in the grid */
            display: block;
            transition: transform 0.8s ease;
        }

        .media-card:hover {
            border-color: rgba(255,255,255,0.15);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.7);
        }

        .media-card:hover img, .media-card:hover video {
            transform: scale(1.04);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .media-card { cursor: zoom-in; }

        #mediaModal.active { display: flex; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #modalContent img, #modalContent video {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 4px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
    </style>

    <div id="mediaModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/95 backdrop-blur-xl cursor-zoom-out">
        <div class="relative max-w-[90vw] max-h-[90vh] flex items-center justify-center">
            <button id="closeModal" class="absolute -top-12 right-0 text-white/50 hover:text-white text-xs tracking-widest uppercase font-bold">Close // [×]</button>
            <div id="modalContent" class="w-full h-full flex items-center justify-center"></div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('mediaModal');
        const modalContent = document.getElementById('modalContent');
        const closeModal = document.getElementById('closeModal');
        const cards = document.querySelectorAll('.media-card');

        cards.forEach(card => {
            card.addEventListener('click', () => {
                const media = card.querySelector('img, video');
                if(!media) return;
                modalContent.innerHTML = ''; 

                if (media.tagName === 'IMG') {
                    const newImg = document.createElement('img');
                    newImg.src = media.src;
                    modalContent.appendChild(newImg);
                } else if (media.tagName === 'VIDEO') {
                    const newVideo = document.createElement('video');
                    newVideo.src = media.src;
                    newVideo.controls = true;
                    newVideo.autoplay = true;
                    newVideo.loop = true;
                    modalContent.appendChild(newVideo);
                }

                modal.classList.add('active');
                document.body.style.overflow = 'hidden'; 
            });
        });

        const handleClose = () => {
            modal.classList.remove('active');
            modalContent.innerHTML = '';
            document.body.style.overflow = 'auto';
        };

        modal.addEventListener('click', (e) => {
            if (e.target === modal || e.target === closeModal) handleClose();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') handleClose();
        });
    </script>
