<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;400;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000; 
            color: #fff; 
            margin: 0;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        #progress-bar {
            position: fixed; top: 0; left: 0; height: 1px;
            background: #fff; width: 0%; z-index: 10001;
        }

        #custom-cursor {
            width: 12px; height: 12px; background: #fff; border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999;
            mix-blend-mode: difference; transition: transform 0.3s ease;
            display: none;
        }
        @media (min-width: 1024px) { #custom-cursor { display: block; } }

        .reveal {
            opacity: 0; transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .archive-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            align-items: start;
            grid-auto-flow: dense;
        }
        
        @media (min-width: 768px) { 
            .archive-grid { grid-template-columns: repeat(3, 1fr); gap: 2rem; } 
        }
        @media (min-width: 1024px) { 
            .archive-grid { grid-template-columns: repeat(4, 1fr); gap: 3rem; } 
        }

        .media-card {
            position: relative; overflow: hidden; width: 100%;
            background: #0a0a0a; border-radius: 2px;
            transition: all 0.5s ease;
        }

        .media-card img, .media-card video {
            width: 100%; height: 100%; display: block; object-fit: cover;
        }

        .span-2 { grid-column: span 2; }
        .row-2 { grid-row: span 2; }

        .video-feature-box {
            grid-column: span 2;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; 
            padding: 18px 15px;
            display: flex; flex-direction: column; gap: 10px;
            margin: 5px 0;
        }

        .nav-link {
            letter-spacing: 0.5em; text-transform: uppercase;
            font-size: 9px; color: rgba(255,255,255,0.4);
            transition: color 0.3s ease;
        }
        .nav-link:hover { color: #fff; }

        #zoomModal {
            display: none; position: fixed; inset: 0;
            background: #000; z-index: 10000;
            justify-content: center; align-items: center;
        }

       .video-scroll-container {
            display: flex; 
            overflow-x: auto; 
            gap: 12px;
            padding-bottom: 15px; /* Extra space for smooth swiping */
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch; /* Makes it smooth on iPhone */
            scroll-snap-type: x mandatory;
        }
        .video-scroll-container::-webkit-scrollbar { display: none; }

        .mini-video-card {
            flex: 0 0 140px; /* This stops them from shrinking to fit the screen */
            aspect-ratio: 9/16;
            background: #000; 
            border-radius: 10px; 
            overflow: hidden;
            scroll-snap-align: start;
        }
        
        /* Fixed logic to prevent overlapping */
        .featured-image {
            grid-column: span 2;
            z-index: 10;
            position: relative;
        }
        /* Custom Zoom Logic */
.group img {
    will-change: transform; /* Keeps the animation buttery smooth */
}

.group:hover img {
    opacity: 0.8 !important; /* Slight brighten during the zoom */
}
    </style>
</head>
