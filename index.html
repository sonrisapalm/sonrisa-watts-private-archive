<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="google-site-verification" content="XrLW5QIY_TW4q0et-boZc8WBwuoyI36N0TEy6uL9Z7A" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .text-gradient {
            background: linear-gradient(to right, #ffffff, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .masonry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-auto-rows: 350px;
            gap: 1.5rem;
        }

        .media-item { 
            position: relative; 
            overflow: hidden; 
            border-radius: 0.75rem; 
            border: 1px solid rgba(255,255,255,0.05);
            background: #070b14;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .item-tall { grid-row: span 2; }
        .item-wide { grid-column: span 2; }

        .media-item img, .media-item video { 
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .media-item:hover {
            border-color: rgba(255,255,255,0.3);
            transform: translateY(-5px);
            z-index: 10;
        }

        .media-item:hover img, .media-item:hover video {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .item-wide { grid-column: span 1; }
            .masonry-grid { grid-auto-rows: 300px; }
        }
    </style>
</head>

        <nav class="mt-16 flex flex-col md:flex-row justify-center items-center gap-4">
