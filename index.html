        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; /* True black for luxury feel */
            color: #ffffff; 
            overflow-x: hidden;
        }

        .editorial-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            /* This line fixes the order issue - no "packing" allowed */
            grid-auto-flow: row; 
            gap: 1.5rem;
            width: 100%;
        }
        
        @media (min-width: 768px) { .editorial-grid { grid-template-columns: repeat(3, 1fr); gap: 2rem; } }
        @media (min-width: 1024px) { .editorial-grid { grid-template-columns: repeat(4, 1fr); } }

        .media-card {
            position: relative;
            background: #0a0a0a;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            transform: translateY(30px);
            animation: reveal 0.8s ease forwards;
        }

        @keyframes reveal {
            to { opacity: 1; transform: translateY(0); }
        }

        .media-card img, .media-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(20%); /* Subtle editorial desaturation */
            transition: all 0.9s ease;
        }

        .media-card:hover img, .media-card:hover video {
            transform: scale(1.05);
            filter: grayscale(0%);
        }

        /* The "Expensive" Border Effect */
        .media-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
        }

        .featured {
            grid-column: span 2;
            grid-row: span 2;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .glass-nav:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .text-kern {
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-size: 10px;
            color: #666;
        }
    </style>
</head>

    <div id="mediaModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/98 backdrop-blur-2xl cursor-zoom-out">
        <div class="relative max-w-[85vw] max-h-[85vh]">
            <button id="closeModal" class="absolute -top-16 right-0 text-white/30 hover:text-white text-[10px] tracking-widest uppercase font-bold transition-colors">[ Close ]</button>
            <div id="modalContent" class="w-full h-full flex items-center justify-center"></div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('mediaModal');
        const modalContent = document.getElementById('modalContent');
        const closeModal = document.getElementById('closeModal');
        const cards = document.querySelectorAll('.media-card');

        cards.forEach(card => {
            card.addEventListener('click', () => {
                const media = card.querySelector('img, video');
                if(!media) return;
                modalContent.innerHTML = ''; 

                const cloned = media.cloneNode(true);
                if (cloned.tagName === 'VIDEO') {
                    cloned.controls = true;
                    cloned.autoplay = true;
                }
                modalContent.appendChild(cloned);
                modal.classList.add('active');
                modal.style.display = 'flex';
                document.body.style.overflow = 'hidden'; 
            });
        });

        const handleClose = () => {
            modal.style.display = 'none';
            modalContent.innerHTML = '';
            document.body.style.overflow = 'auto';
        };

        modal.addEventListener('click', (e) => {
            if (e.target === modal || e.target === closeModal) handleClose();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') handleClose();
        });
    </script>
