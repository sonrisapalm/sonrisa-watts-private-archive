<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Pics | Sonrisa Watts Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000; 
            color: #fff; 
            margin: 0;
            overflow-x: hidden;
        }

        .reveal {
            opacity: 0; transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Custom Masonry-style Grid */
        .baby-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        @media (min-width: 768px) { .baby-grid { grid-template-columns: repeat(3, 1fr); } }

        .back-btn {
            letter-spacing: 0.4em;
            font-size: 10px;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>

    <nav class="p-8 reveal">
        <a href="index.html" class="back-btn opacity-40 hover:opacity-100 uppercase">← Back to Archive</a>
    </nav>

    <header class="pt-10 pb-20 px-6 text-center reveal">
        <h1 class="text-2xl font-light tracking-[0.5em] uppercase">Baby Pics</h1>
        <div class="mt-4 w-12 h-[1px] bg-white/20 mx-auto"></div>
    </header>

    <main class="max-w-5xl mx-auto px-6 pb-40">
        <div class="baby-grid">
            
            <div class="col-span-2 reveal group cursor-pointer overflow-hidden rounded-2xl border border-zinc-900">
                <img src="images/sonrisawatts_babypic.jpg" 
                     alt="Sonrisa Watts Baby" 
                     class="w-full h-[400px] object-cover transition-transform duration-1000 group-hover:scale-105">
            </div>


            <div class="col-span-2 reveal group cursor-pointer overflow-hidden rounded-2xl border border-zinc-900">
                <img src="images/sonrisawatts_babypic20.jpg" 
                     alt="Sonrisa Watts Baby" 
                     class="w-full h-[400px] object-cover transition-transform duration-1000 group-hover:scale-105">
            </div>


            <div class="col-span-2 reveal group cursor-pointer overflow-hidden rounded-2xl border border-zinc-900">
                <img src="images/sonrisawattspicture_baby17.jpg" 
                     alt="Sonrisa Watts Baby" 
                     class="w-full h-[400px] object-cover transition-transform duration-1000 group-hover:scale-105">
            </div>


 <div class="col-span-2 reveal group cursor-pointer overflow-hidden rounded-2xl border border-zinc-900">
                <img src="images/sonrisawattspicture_babypics.jpg" 
                     alt="Sonrisa Watts Baby" 
                     class="w-full h-[400px] object-cover transition-transform duration-1000 group-hover:scale-105">
            </div>
            
            <div class="col-span-2 reveal group cursor-pointer overflow-hidden rounded-2xl border border-zinc-900">
                <img src="images/sonrisawatts_babypic123.jpg" 
                     alt="Sonrisa Watts Baby" 
                     class="w-full h-[400px] object-cover transition-transform duration-1000 group-hover:scale-105">
            </div>

            
            

            <div class="reveal group cursor-pointer overflow-hidden rounded-xl border border-zinc-900 bg-zinc-950">
                <div class="aspect-[3/4] flex items-center justify-center text-[10px] tracking-widest text-zinc-700 uppercase">
                    More coming soon
                </div>
            </div>

            <div class="reveal group cursor-pointer overflow-hidden rounded-xl border border-zinc-900 bg-zinc-950">
                <div class="aspect-[3/4] flex items-center justify-center text-[10px] tracking-widest text-zinc-700 uppercase">
                    More coming soon
                </div>
            </div>

        </div>
    </main>

    <script>
        // Reveal Logic
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
